name: Automate release

on:
  workflow_dispatch:
    inputs:
      short-description:
        description: 'A short description for the release ticket'
        required: true
        type: string
      branch:
        description: 'The branch from which to release.'
        required: false
        default: 'master'
        type: string

jobs:
  release:
    name: Release
    uses: SonarSource/release-github-actions/.github/workflows/ide-automated-release.yml@v1
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      jira-project-key: "CLI"
      project-name: "SonarQube CLI"
      short-description: ${{ inputs.short-description }}
      branch: ${{ inputs.branch }}

  bump-version:
    name: Create a PR to bump version
    runs-on: github-ubuntu-latest-s
    needs:
      - release
    permissions:
      id-token: write # required for Vault OIDC auth to fetch Artifactory credentials
      contents: write # write for peter-evans/create-pull-request, read for actions/checkout
      pull-requests: write # write for peter-evans/create-pull-request
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.branch }}

      - name: Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@c154b4a417b51cb98dd71137f49bf20e77c56820 # 3.4.0
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username | ARTIFACTORY_USER;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;

      - uses: ./.github/actions/setup-bun
        with:
          artifactory-username: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_USER }}
          artifactory-password: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN }}

      - name: Update install scripts version
        env:
          RELEASED_VERSION: ${{ needs.release.outputs.released-version }}
        run: |
          sed -i "s/version=\"[0-9][^\"]*\"/version=\"${RELEASED_VERSION}\"/" user-scripts/install.sh
          sed -i "s/\$SonarVersion = \"[^\"]*\"/\$SonarVersion = \"${RELEASED_VERSION}\"/" user-scripts/install.ps1
      - name: bump-version
        env:
          NEW_VERSION: ${{ needs.release.outputs.new-version }}
        run: |
          if [[ "${NEW_VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([1-9][0-9]*)$ ]]; then
            # Bugfix release: new-version has non-zero patch (e.g. "0.8.2"), bump to next minor instead
            FULL_VERSION="${BASH_REMATCH[1]}.$((BASH_REMATCH[2] + 1)).0"
          else
            # Minor release: new-version is major.minor (e.g. "0.9"), just append patch
            FULL_VERSION="${NEW_VERSION}.0"
          fi
          mise exec node@latest -- npm version --no-git-tag-version ${FULL_VERSION}
          bun run gen:docs
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          author: ${{ github.actor }} <${{ github.actor }}>
          commit-message: Prepare next development iteration
          title: Prepare next development iteration
          branch: bot/bump-project-version
          branch-suffix: timestamp
          delete-branch: true
          base: ${{ inputs.branch }}
          draft: true # so that we don't actually need to re-open the PR and just make it ready for review
          reviewers: ${{ github.actor }}
          body: Bump the version for the new iteration. Created by release automation.
