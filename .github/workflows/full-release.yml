name: Automate release

on:
  workflow_dispatch:
    inputs:
      short-description:
        description: 'A short description for the release ticket'
        required: true
        type: string
      branch:
        description: 'The branch from which to release.'
        required: false
        default: 'master'
        type: string

jobs:
  check-draft-exists:
    name: Check draft release exists
    runs-on: github-ubuntu-latest-s
    # contents: write is required — draft releases are only visible to tokens with write access.
    permissions:
      contents: write
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
    steps:
      - name: Get release version
        id: version
        uses: SonarSource/release-github-actions/get-release-version@v1
        with:
          branch: ${{ inputs.branch }}

      - name: Verify draft release exists for expected version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.release-version }}
        run: |
          echo "Expecting a draft release tagged '$VERSION'."
          IS_DRAFT=$(gh release view "$VERSION" --json isDraft -q '.isDraft' 2>/dev/null || echo "missing")
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Found a draft release tagged '$VERSION'. Proceeding."
          elif [ "$IS_DRAFT" = "false" ]; then
            echo "::error::Release '$VERSION' already exists and is published. Aborting to avoid duplicate publication."
            exit 1
          else
            echo "::error::No draft release tagged '$VERSION' found. Run prepare-release-notes.yml first to generate and review the release notes."
            exit 1
          fi

  release:
    name: Release
    needs:
      - check-draft-exists
    uses: SonarSource/release-github-actions/.github/workflows/ide-automated-release.yml@3f6dcbe90eb00c1017d35b40f402719fc8e47a70 # 1.6.0
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      jira-project-key: 'CLI'
      project-name: 'SonarQube CLI'
      short-description: ${{ inputs.short-description }}
      branch: ${{ inputs.branch }}

  bump-version:
    name: Create a PR to bump version
    runs-on: github-ubuntu-latest-s
    needs:
      - release
    permissions:
      id-token: write # required for Vault OIDC auth to fetch Artifactory credentials
      contents: write # write for peter-evans/create-pull-request, read for actions/checkout
      pull-requests: write # write for peter-evans/create-pull-request
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.branch }}

      - name: Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@c154b4a417b51cb98dd71137f49bf20e77c56820 # 3.4.0
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username | ARTIFACTORY_USER;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;

      - uses: ./.github/actions/setup-bun
        with:
          artifactory-username: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_USER }}
          artifactory-password: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN }}

      - name: Update install scripts version
        env:
          RELEASED_VERSION: ${{ needs.release.outputs.released-version }}
        run: |
          sed -i "s/version=\"[0-9][^\"]*\"/version=\"${RELEASED_VERSION}\"/" user-scripts/install.sh
          sed -i "s/\$SonarVersion = \"[^\"]*\"/\$SonarVersion = \"${RELEASED_VERSION}\"/" user-scripts/install.ps1
      - name: bump-version
        env:
          NEW_VERSION: ${{ needs.release.outputs.new-version }}
        run: |
          if [[ "${NEW_VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([1-9][0-9]*)$ ]]; then
            # Bugfix release: new-version has non-zero patch (e.g. "0.8.2"), bump to next minor instead
            FULL_VERSION="${BASH_REMATCH[1]}.$((BASH_REMATCH[2] + 1)).0"
          else
            # Minor release: new-version is major.minor (e.g. "0.9"), just append patch
            FULL_VERSION="${NEW_VERSION}.0"
          fi
          bun run gen:docs
          mise exec node@latest -- npm version --no-git-tag-version ${FULL_VERSION}
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          author: ${{ github.actor }} <${{ github.actor }}>
          commit-message: Prepare next development iteration
          title: Prepare next development iteration
          branch: bot/bump-project-version
          branch-suffix: timestamp
          delete-branch: true
          base: ${{ inputs.branch }}
          draft: true # so that we don't actually need to re-open the PR and just make it ready for review
          reviewers: ${{ github.actor }}
          body: Bump the version for the new iteration. Created by release automation.

  publish-release-notes:
    name: Copy reviewed notes to published release
    runs-on: github-ubuntu-latest-s
    needs: [check-draft-exists, release]
    permissions:
      contents: write
    steps:
      - name: Copy draft body to published release and delete draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAFT_VERSION: ${{ needs.check-draft-exists.outputs.release-version }}
          RELEASED_VERSION: ${{ needs.release.outputs.released-version }}
        run: |
          echo "Copying notes from draft '$DRAFT_VERSION' to published release '$RELEASED_VERSION'..."
          gh release view "$DRAFT_VERSION" --json body --jq '.body' > release-notes.md
          gh release edit "$RELEASED_VERSION" --notes-file release-notes.md
          # Draft releases do not create a git tag (see https://github.com/orgs/community/discussions/24690),
          # so --cleanup-tag is intentionally omitted.
          echo "Deleting draft '$DRAFT_VERSION'..."
          gh release delete "$DRAFT_VERSION" --yes
          echo "Done."
