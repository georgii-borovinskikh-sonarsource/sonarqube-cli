<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commands — SonarQube CLI</title>
  <meta name="description" content="Full command reference for the SonarQube CLI. Browse all commands, options, and examples for sonar auth, sonar install, sonar integrate, sonar list, sonar analyze, and more. Machine-readable schema available at /data/commands.json.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="canonical" href="https://cli.sonarqube.com/commands.html">
  <meta property="og:title" content="Commands — SonarQube CLI">
  <meta property="og:description" content="Full command reference for the SonarQube CLI. Browse all commands, options, and examples. Machine-readable schema available at /data/commands.json.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cli.sonarqube.com/commands.html">
  <meta property="og:site_name" content="SonarQube CLI">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Commands — SonarQube CLI">
  <meta name="twitter:description" content="Full command reference for the SonarQube CLI. Browse all commands, options, and examples. Machine-readable schema available at /data/commands.json.">
  <link rel="alternate" type="application/json" href="data/commands.json" title="Command Reference (JSON)">
  <link rel="stylesheet" href="assets/style.css">
  <script>if(localStorage.getItem('clidoc-theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
</head>
<body class="commands-page">

<!-- ─── Nav ──────────────────────────────────────────────────── -->
<nav class="nav">
  <a href="index.html" class="logo">
    <img class="logo-dark"  src="assets/SQ-CLI_Dark Backgrounds.svg"  alt="SonarQube CLI">
    <img class="logo-light" src="assets/SQ-CLI_Light Backgrounds.svg" alt="SonarQube CLI">
  </a>
  <span class="beta-badge">BETA</span>
  <span class="version" id="nav-version" style="display:none">v0.0.0</span>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="commands.html" class="nav-link active">Commands</a>
    <a href="https://github.com/SonarSource/sonarqube-cli" class="nav-link" target="_blank" rel="noopener">GitHub</a>
    <a href="llms.txt" class="nav-link">llms.txt</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">☀</button>
  </div>
</nav>

<!-- ─── App ──────────────────────────────────────────────────── -->
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-search">
      <div class="sidebar-toolbar">
        <input type="search" class="search-input" id="search" placeholder="Search commands…" autocomplete="off" spellcheck="false">
        <div class="view-toggle">
          <button class="view-toggle-btn active" id="viewColumnsBtn" title="Column view">Columns</button>
          <button class="view-toggle-btn" id="viewListBtn" title="List view">List</button>
        </div>
      </div>
    </div>
    <div class="sidebar-tree" id="tree"></div>
  </aside>

  <!-- Main panel -->
  <main class="main-panel" id="detail">
    <div class="empty-state">Loading…</div>
  </main>
</div>

<script type="module">
const data = await fetch('data/commands.json').then(r => r.json()).catch(() => null);
if (!data) {
  document.getElementById('detail').innerHTML = '<div class="empty-state">No command data found.</div>';
  throw new Error('Failed to load commands.json');
}

// Build lookup map
const byId = {};
for (const cmd of data.commands) {
  byId[cmd.id] = cmd;
}

// Set version
document.getElementById('nav-version').textContent = 'v' + data.version;

// ── State ────────────────────────────────────────────────────
const collapsed = new Set(); // IDs of collapsed groups
let activeId = null;
let viewMode = 'columns'; // 'tree' (pills) | 'columns' | 'list'

// ── Ancestor helpers ─────────────────────────────────────────
function getAncestorIds(id) {
  const ancestors = new Set();
  let cur = byId[id];
  while (cur && cur.parentId) {
    ancestors.add(cur.parentId);
    cur = byId[cur.parentId];
  }
  return ancestors;
}

// ── Tree rendering (dispatches to pill or text) ───────────────
function renderTree(filter) {
  const treeEl = document.getElementById('tree');
  treeEl.innerHTML = '';

  const root = byId['sonar'];
  if (!root) return;

  if (viewMode === 'columns' && !filter) {
    treeEl.appendChild(buildColumnView(root));
    return;
  }

  if (filter) {
    const q = filter.toLowerCase();
    const matches = data.commands.filter(c =>
      c.fullName.toLowerCase().includes(q) ||
      c.description.toLowerCase().includes(q)
    );
    for (const cmd of matches) {
      treeEl.appendChild(viewMode === 'list'
        ? renderTreeNode(cmd, true)
        : buildPillNode(cmd, true));
    }
    if (matches.length === 0) {
      treeEl.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text-muted)">No commands match.</div>';
    }
  } else {
    if (viewMode === 'tree') {
      treeEl.appendChild(buildPillNode(root, false));
    } else {
      for (const childId of root.children) {
        const child = byId[childId];
        if (child) treeEl.appendChild(renderTreeNode(child, false));
      }
    }
  }
}

// ── Pill tree node (tree mode) ────────────────────────────────
function buildPillNode(cmd, flat) {
  const ancestors = activeId ? getAncestorIds(activeId) : new Set();

  const wrapper = document.createElement('div');
  wrapper.className = 'tree-node';
  wrapper.dataset.id = cmd.id;

  const row = document.createElement('div');
  row.className = 'tree-row';
  row.dataset.id = cmd.id;

  const pill = document.createElement('span');
  const pillClass = cmd.isRoot ? 'pill-root'
    : (cmd.isGroup || cmd.depth === 1) ? 'pill-group'
    : 'pill-leaf';
  const isSelected  = cmd.id === activeId;
  const isOnPath    = ancestors.has(cmd.id);
  pill.className = 'pill ' + pillClass
    + (isSelected ? ' selected' : '')
    + (!isSelected && isOnPath ? ' path-highlight' : '');
  pill.textContent = cmd.name;
  row.appendChild(pill);

  if (!cmd.isRoot) {
    row.addEventListener('click', () => {
      if (cmd.isGroup && !flat) {
        if (collapsed.has(cmd.id)) collapsed.delete(cmd.id);
        else collapsed.add(cmd.id);
        renderTree(document.getElementById('search').value.trim());
      }
      selectCommand(cmd.id);
    });
  }

  wrapper.appendChild(row);

  if (cmd.isGroup && !flat && cmd.children.length > 0) {
    const childrenEl = document.createElement('div');
    childrenEl.className = 'tree-children' + (collapsed.has(cmd.id) ? ' collapsed' : '');
    for (const childId of cmd.children) {
      const child = byId[childId];
      if (child) childrenEl.appendChild(buildPillNode(child, false));
    }
    wrapper.appendChild(childrenEl);
  }

  return wrapper;
}

// ── Text tree node (list mode) ────────────────────────────────
function renderTreeNode(cmd, flat) {
  const wrapper = document.createElement('div');
  wrapper.className = 'tree-node';
  wrapper.dataset.id = cmd.id;

  const row = document.createElement('div');
  row.className = 'tree-row' + (cmd.id === activeId ? ' selected' : '');
  row.dataset.id = cmd.id;

  const label = document.createElement('span');
  label.className = 'tree-label ' + (cmd.isRoot ? 'root' : (cmd.isGroup || cmd.depth === 1) ? 'group' : 'leaf');
  label.textContent = cmd.name;
  row.appendChild(label);

  row.addEventListener('click', () => { selectCommand(cmd.id); });

  wrapper.appendChild(row);

  if (cmd.isGroup && !flat && cmd.children.length > 0) {
    const childrenEl = document.createElement('div');
    childrenEl.className = 'tree-children';
    for (const childId of cmd.children) {
      const child = byId[childId];
      if (child) childrenEl.appendChild(renderTreeNode(child, false));
    }
    wrapper.appendChild(childrenEl);
  }

  return wrapper;
}

// ── Column view ──────────────────────────────────────────────
function getChildren(cmd) {
  return (cmd.children || []).map(id => byId[id]).filter(Boolean);
}

function getMaxDepth(cmd, depth = 0) {
  let max = depth;
  for (const c of getChildren(cmd)) max = Math.max(max, getMaxDepth(c, depth + 1));
  return max;
}

function flattenForColumns(cmd, depth, rows, childIndex = 0) {
  const children = getChildren(cmd);
  if (depth === 1 && childIndex > 0) rows.push({ _spacer: true });
  if (children.length === 0) {
    const row = {}; row[depth] = cmd; rows.push(row); return;
  }
  const startRow = rows.length;
  flattenForColumns(children[0], depth + 1, rows, 0);
  rows[startRow][depth] = cmd;
  for (let i = 1; i < children.length; i++) flattenForColumns(children[i], depth + 1, rows, i);
}

function buildColumnView(root) {
  const pathIds = activeId ? new Set([activeId, ...getAncestorIds(activeId)]) : new Set();
  const wrapper = document.createElement('div');
  wrapper.className = 'tree-columns';

  const maxDepth = getMaxDepth(root);
  const rows = [];
  flattenForColumns(root, 0, rows);

  const grid = document.createElement('div');
  grid.className = 'col-grid';
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = `repeat(${maxDepth + 1}, max-content)`;
  grid.style.gap = '0';
  grid.style.alignItems = 'start';

  const pillElements = {};

  for (const row of rows) {
    if (row._spacer) {
      for (let c = 0; c <= maxDepth; c++) {
        const spacer = document.createElement('div'); spacer.style.height = '12px';
        grid.appendChild(spacer);
      }
      continue;
    }
    for (let c = 0; c <= maxDepth; c++) {
      const cell = document.createElement('div');
      const entry = row[c];
      cell.className = entry ? 'col-cell' : 'col-cell col-cell-empty';
      if (entry) {
        const rowEl = document.createElement('div');
        rowEl.className = 'col-row' + (entry.id === activeId ? ' selected' : '');
        rowEl.dataset.id = entry.id;

        const pill = document.createElement('span');
        const pillClass = c === 0 ? 'pill-root'
          : (getChildren(entry).length > 0 || c === 1) ? 'pill-group' : 'pill-leaf';
        const isSelected = entry.id === activeId;
        const isOnPath   = !isSelected && pathIds.has(entry.id);
        pill.className = 'pill ' + pillClass
          + (isSelected ? ' selected' : '')
          + (isOnPath   ? ' path-highlight' : '');
        pill.textContent = entry.name;
        pill.dataset.id = entry.id;


        if (c > 0) rowEl.addEventListener('click', () => selectCommand(entry.id));
        rowEl.appendChild(pill);
        cell.appendChild(rowEl);
        pillElements[entry.id] = pill;
      }
      grid.appendChild(cell);
    }
  }

  wrapper.appendChild(grid);

  const draw = () => drawColumnConnectors(wrapper, grid, pillElements, root, pathIds);
  requestAnimationFrame(draw);

  const ro = new ResizeObserver(draw);
  ro.observe(wrapper);
  const onResize = () => draw();
  window.addEventListener('resize', onResize);
  const mo = new MutationObserver(() => {
    if (!wrapper.isConnected) {
      ro.disconnect();
      window.removeEventListener('resize', onResize);
      mo.disconnect();
    }
  });
  mo.observe(document.getElementById('tree'), { childList: true });

  return wrapper;
}

function drawColumnConnectors(wrapper, grid, pillElements, root, pathIds) {
  const old = wrapper.querySelector('.col-svg');
  if (old) old.remove();

  const wRect = wrapper.getBoundingClientRect();
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('col-svg');
  svg.style.width  = grid.scrollWidth  + 'px';
  svg.style.height = grid.scrollHeight + 'px';

  const paths = [];
  collectConnectorPaths(root, pillElements, wRect, paths, pathIds);
  for (const p of paths) { if (!p._highlighted) svg.appendChild(p); }
  for (const p of paths) { if (p._highlighted)  svg.appendChild(p); }

  wrapper.insertBefore(svg, grid);
}

function collectConnectorPaths(node, pillElements, wRect, paths, pathIds) {
  const children = getChildren(node);
  if (children.length === 0) return;

  const parentPill = pillElements[node.id];
  if (!parentPill) return;

  const pRect    = parentPill.getBoundingClientRect();
  const pRight   = pRect.right  - wRect.left;
  const pCenterY = pRect.top + pRect.height / 2 - wRect.top;

  const childPos = [];
  for (const child of children) {
    const cp = pillElements[child.id];
    if (!cp) continue;
    const cRect = cp.getBoundingClientRect();
    childPos.push({ cLeft: cRect.left - wRect.left, cCenterY: cRect.top + cRect.height / 2 - wRect.top, id: child.id });
  }
  if (childPos.length === 0) return;

  const midX = pRight + (childPos[0].cLeft - pRight) / 2;

  for (const cp of childPos) {
    const isOnPath = pathIds.has(node.id) && pathIds.has(cp.id);
    let d;
    if (Math.abs(cp.cCenterY - pCenterY) < 2) {
      d = `M ${pRight} ${pCenterY} L ${cp.cLeft} ${cp.cCenterY}`;
    } else {
      const r = 6, yDir = cp.cCenterY > pCenterY ? 1 : -1;
      d = [
        `M ${pRight} ${pCenterY}`,
        `L ${midX - r} ${pCenterY}`,
        `Q ${midX} ${pCenterY} ${midX} ${pCenterY + r * yDir}`,
        `L ${midX} ${cp.cCenterY - r * yDir}`,
        `Q ${midX} ${cp.cCenterY} ${midX + r} ${cp.cCenterY}`,
        `L ${cp.cLeft} ${cp.cCenterY}`
      ].join(' ');
    }
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.style.stroke = isOnPath ? 'var(--accent)' : 'var(--border)';
    path.style.strokeWidth = isOnPath ? '2' : '1.5';
    path._highlighted = isOnPath;
    paths.push(path);
  }
  for (const child of children) collectConnectorPaths(child, pillElements, wRect, paths, pathIds);
}

// ── Select command ───────────────────────────────────────────
function selectCommand(id) {
  const cmd = byId[id];
  if (!cmd) return;

  activeId = id;
  history.replaceState(null, '', '#' + id);

  // Re-render tree to update selection + path highlighting
  renderTree(document.getElementById('search').value.trim());

  // Render detail panel
  const detail = document.getElementById('detail');
  detail.innerHTML = renderDetail(cmd);

  // Wire copy buttons
  detail.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.copy;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    });
  });

  // Wire subcommand links
  detail.querySelectorAll('.subcmd-item[data-target]').forEach(item => {
    item.addEventListener('click', () => {
      const targetId = item.dataset.target;
      expandParents(targetId);
      renderTree(document.getElementById('search').value.trim());
      selectCommand(targetId);
    });
  });
}

function renderDetail(cmd) {
  const parts = [];

  // Header
  parts.push(`<div class="detail-header">`);
  parts.push(`<span class="detail-title"><code>${escHtml(cmd.fullName)}</code></span>`);
  parts.push(`</div>`);

  // Description
  parts.push(`<p class="detail-desc">${escHtml(cmd.description)}</p>`);

  // Options
  if (cmd.options.length > 0) {
    parts.push(`<div class="detail-section">`);
    parts.push(`<div class="detail-section-title">Options</div>`);
    parts.push(`<table class="opts-table">`);
    parts.push(`<thead><tr><th>Option</th><th>Type</th><th>Required</th><th>Description</th><th>Default</th></tr></thead>`);
    parts.push(`<tbody>`);
    for (const opt of cmd.options) {
      const flags = opt.short
        ? `<span class="opt-flag">${escHtml(opt.long)}, ${escHtml(opt.short)}</span>`
        : `<span class="opt-flag">${escHtml(opt.long)}</span>`;
      const typeBadge = `<span class="type-badge ${opt.type}">${escHtml(opt.type)}</span>`;
      const req = opt.required
        ? `<span class="opt-req-yes">Yes</span>`
        : `<span class="opt-req-no">No</span>`;
      const def = opt.defaultValue !== undefined && opt.defaultValue !== null
        ? `<span class="opt-default">${escHtml(String(opt.defaultValue))}</span>`
        : `<span class="opt-req-no">—</span>`;
      const allowedHtml = opt.allowedValues && opt.allowedValues.length
        ? `<div class="opt-allowed">${opt.allowedValues.map(v => `<code class="opt-allowed-val">${escHtml(v)}</code>`).join('')}</div>`
        : '';
      parts.push(`<tr><td>${flags}</td><td>${typeBadge}</td><td>${req}</td><td>${escHtml(opt.description)}${allowedHtml}</td><td>${def}</td></tr>`);
    }
    parts.push(`</tbody></table></div>`);
  }

  // Arguments
  if (cmd.arguments.length > 0) {
    parts.push(`<div class="detail-section">`);
    parts.push(`<div class="detail-section-title">Arguments</div>`);
    parts.push(`<table class="args-table">`);
    parts.push(`<thead><tr><th>Argument</th><th>Required</th><th>Description</th></tr></thead>`);
    parts.push(`<tbody>`);
    for (const arg of cmd.arguments) {
      const displayName = arg.variadic ? `[${escHtml(arg.name)}...]` : `<${escHtml(arg.name)}>`;
      const req = arg.required
        ? `<span class="opt-req-yes">Yes</span>`
        : `<span class="opt-req-no">No</span>`;
      parts.push(`<tr><td><span class="arg-name">${displayName}</span></td><td>${req}</td><td>${escHtml(arg.description)}</td></tr>`);
    }
    parts.push(`</tbody></table></div>`);
  }

  // Examples
  if (cmd.examples.length > 0) {
    parts.push(`<div class="detail-section">`);
    parts.push(`<div class="detail-section-title">Examples</div>`);
    for (const ex of cmd.examples) {
      parts.push(`<div class="example-block">`);
      parts.push(`<div class="example-desc">${escHtml(ex.description)}</div>`);
      parts.push(`<div class="example-code-row">`);
      parts.push(`<span class="example-code">${escHtml(ex.command)}</span>`);
      parts.push(`<button class="copy-btn btn-sm" data-copy="${escAttr(ex.command)}">Copy</button>`);
      parts.push(`</div></div>`);
    }
    parts.push(`</div>`);
  }

  // Subcommands
  if (cmd.isGroup && cmd.children.length > 0) {
    parts.push(`<div class="detail-section">`);
    parts.push(`<div class="detail-section-title">Subcommands</div>`);
    parts.push(`<div class="subcmd-list">`);
    for (const childId of cmd.children) {
      const child = byId[childId];
      if (!child) continue;
      parts.push(`<div class="subcmd-item" data-target="${escAttr(child.id)}">`);
      parts.push(`<span class="subcmd-name">${escHtml(child.fullName)}</span>`);
      parts.push(`<span class="subcmd-desc">${escHtml(child.description)}</span>`);
      parts.push(`<span class="subcmd-arrow">→</span>`);
      parts.push(`</div>`);
    }
    parts.push(`</div></div>`);
  }

  return parts.join('');
}

// ── Helpers ──────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function escAttr(str) {
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function expandParents(id) {
  const cmd = byId[id];
  if (!cmd || !cmd.parentId) return;
  collapsed.delete(cmd.parentId);
  expandParents(cmd.parentId);
}

// ── View toggle ──────────────────────────────────────────────
function setViewMode(mode) {
  if (viewMode === mode) return;
  viewMode = mode;
  document.getElementById('viewColumnsBtn').classList.toggle('active', mode === 'columns');
  document.getElementById('viewListBtn').classList.toggle('active', mode === 'list');
  renderTree(document.getElementById('search').value.trim());
}
document.getElementById('viewColumnsBtn').addEventListener('click', () => setViewMode('columns'));
document.getElementById('viewListBtn').addEventListener('click', () => setViewMode('list'));
document.querySelector('.sidebar').classList.add('col-mode');

// ── Search ───────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim();
  if (!q) {
    // Re-collapse to previous state
    renderTree('');
  } else {
    renderTree(q);
  }
});

// ── Init ─────────────────────────────────────────────────────
renderTree('');

const hash = location.hash.slice(1);
const startId = (hash && byId[hash]) ? hash : 'sonar-auth-login';
expandParents(startId);
renderTree('');
selectCommand(startId);

// ── Theme toggle ─────────────────────────────────────────────
(function() {
  const btn = document.getElementById('themeToggle');
  if (document.documentElement.getAttribute('data-theme') === 'light') btn.textContent = '☾';
  btn.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      btn.textContent = '☀';
      localStorage.setItem('clidoc-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      btn.textContent = '☾';
      localStorage.setItem('clidoc-theme', 'light');
    }
    // Redraw SVG connectors with updated theme colors
    renderTree(document.getElementById('search').value.trim());
  });
})();

// ── Hash navigation ──────────────────────────────────────────
window.addEventListener('hashchange', () => {
  const id = location.hash.slice(1);
  if (id && byId[id]) {
    expandParents(id);
    renderTree(document.getElementById('search').value.trim());
    selectCommand(id);
  }
});
</script>
</body>
</html>
